server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback for the MyAgenTI control room
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API
    location /api/ {
        proxy_pass http://api:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy WebSocket
    location /ws {
        proxy_pass http://api:8000/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # Serve generated project previews (built with Vite → dist/)
    # Step 1: /preview/ID/ → internal redirect to serve index.html
    location ~ ^/preview/([^/]+)/?$ {
        return 302 /preview/$1/index.html;
    }
    # Step 2: serve actual files from dist/
    location ~ ^/preview/([^/]+)/(.+)$ {
        alias /workspace/$1/dist/$2;
    }

    # Cache static assets (but not under /preview/)
    location ~* ^(?!/preview/).*\.(js|css|png|jpg|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
