services:
  api:
    build: ./api
    container_name: myagenti-api
    restart: unless-stopped
    env_file: .env
    volumes:
      - workspace:/workspace
    networks:
      - myagenti-net

  frontend:
    build: ./frontend
    container_name: myagenti-frontend
    restart: unless-stopped
    volumes:
      - workspace:/workspace:ro
    depends_on:
      - api
    networks:
      - myagenti-net
      - traefik-public

volumes:
  workspace:

networks:
  myagenti-net:
    driver: bridge
  traefik-public:
    external: true
